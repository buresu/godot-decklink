name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DECKLINK_SDK_REPOSITORY: https://gitlab.com/buresu/BlackmagicDeckLinkSDK.git

jobs:
  build:
    name: Build Debug (${{ matrix.os }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            arch: x86_64
            runner: windows-latest
            cmake_args: -A x64
          - os: windows
            arch: arm64
            runner: windows-11-arm
            cmake_args: ''
          - os: macos
            arch: x86_64
            runner: macos-15-intel
            cmake_args: ''
          - os: macos
            arch: arm64
            runner: macos-latest
            cmake_args: ''
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
            cmake_args: ''
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            cmake_args: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Checkout DeckLink SDK
        shell: bash
        env:
          DECKLINK_SDK_TOKEN: ${{ secrets.DECKLINK_SDK_TOKEN }}
        run: |
          if [ -z "$DECKLINK_SDK_TOKEN" ]; then
            echo "DECKLINK_SDK_TOKEN secret is required to clone the private DeckLink SDK repository."
            exit 1
          fi
          cat > ~/.netrc <<EOF
          machine gitlab.com
            login oauth2
            password $DECKLINK_SDK_TOKEN
          EOF
          chmod 600 ~/.netrc
          git clone --depth 1 "$DECKLINK_SDK_REPOSITORY" "$RUNNER_TEMP/BlackmagicDeckLinkSDK"

      - name: Configure CMake
        run: cmake -B build ${{ matrix.cmake_args }} -DCMAKE_BUILD_TYPE=Debug -DDECKLINK_SDK_DIR="${{ runner.temp }}/BlackmagicDeckLinkSDK"

      - name: Build
        run: cmake --build build --config Debug

      - name: Install
        run: cmake --install build --config Debug
