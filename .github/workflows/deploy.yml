name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  DECKLINK_SDK_REPOSITORY: https://gitlab.com/buresu/BlackmagicDeckLinkSDK.git

jobs:
  build:
    name: Build (${{ matrix.os }}, ${{ matrix.arch }}, ${{ matrix.config }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            arch: x86_64
            config: Debug
            runner: windows-latest
            cmake_args: -A x64
            ext: dll
          - os: windows
            arch: x86_64
            config: Release
            runner: windows-latest
            cmake_args: -A x64
            ext: dll
          - os: windows
            arch: arm64
            config: Debug
            runner: windows-latest
            cmake_args: -A ARM64
            ext: dll
          - os: windows
            arch: arm64
            config: Release
            runner: windows-latest
            cmake_args: -A ARM64
            ext: dll
          - os: macos
            arch: x86_64
            config: Debug
            runner: macos-15-intel
            cmake_args: ''
            ext: dylib
          - os: macos
            arch: x86_64
            config: Release
            runner: macos-15-intel
            cmake_args: ''
            ext: dylib
          - os: macos
            arch: arm64
            config: Debug
            runner: macos-latest
            cmake_args: ''
            ext: dylib
          - os: macos
            arch: arm64
            config: Release
            runner: macos-latest
            cmake_args: ''
            ext: dylib
          - os: linux
            arch: x86_64
            config: Debug
            runner: ubuntu-latest
            cmake_args: ''
            ext: so
          - os: linux
            arch: x86_64
            config: Release
            runner: ubuntu-latest
            cmake_args: ''
            ext: so
          - os: linux
            arch: arm64
            config: Debug
            runner: ubuntu-24.04-arm
            cmake_args: ''
            ext: so
          - os: linux
            arch: arm64
            config: Release
            runner: ubuntu-24.04-arm
            cmake_args: ''
            ext: so

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Checkout DeckLink SDK
        shell: bash
        env:
          DECKLINK_SDK_TOKEN: ${{ secrets.DECKLINK_SDK_TOKEN }}
        run: |
          if [ -z "$DECKLINK_SDK_TOKEN" ]; then
            echo "DECKLINK_SDK_TOKEN secret is required to clone the private DeckLink SDK repository."
            exit 1
          fi
          cat > ~/.netrc <<EOF
          machine gitlab.com
            login oauth2
            password $DECKLINK_SDK_TOKEN
          EOF
          chmod 600 ~/.netrc
          git clone --depth 1 "$DECKLINK_SDK_REPOSITORY" "$RUNNER_TEMP/BlackmagicDeckLinkSDK"

      - name: Configure CMake
        run: cmake -B build ${{ matrix.cmake_args }} -DCMAKE_BUILD_TYPE=${{ matrix.config }} -DDECKLINK_SDK_DIR="${{ runner.temp }}/BlackmagicDeckLinkSDK"

      - name: Build
        run: cmake --build build --config ${{ matrix.config }}

      - name: Install
        run: cmake --install build --config ${{ matrix.config }}

      - name: Get library filename
        id: lib-name
        shell: bash
        run: |
          config_lower=$(echo "${{ matrix.config }}" | tr '[:upper:]' '[:lower:]')
          echo "name=libgodot-decklink.${{ matrix.os }}.${config_lower}.${{ matrix.arch }}.${{ matrix.ext }}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: lib-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.config }}
          path: demo/addons/godot-decklink/bin/${{ steps.lib-name.outputs.name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release package
        run: |
          mkdir -p release/addons/godot-decklink/bin
          cp artifacts/* release/addons/godot-decklink/bin/
          cp demo/addons/godot-decklink/godot-decklink.gdextension release/addons/godot-decklink/
          cp demo/addons/godot-decklink/godot-decklink.gdextension.uid release/addons/godot-decklink/
          cd release
          zip -r ../godot-decklink-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: godot-decklink-${{ github.ref_name }}.zip
          generate_release_notes: true
